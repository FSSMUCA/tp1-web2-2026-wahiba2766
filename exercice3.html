<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>TP JavaScript</title>
</head>

<body>

    <h1>Exercices 3</h1>

    <script>

        const TAUX_TVA = 0.20;

        let prixHT = 100;

        let prixTTC = prixHT + (TAUX_TVA * prixHT);

        console.log(
            `Prix HT : ${prixHT} € | TVA (20%) : ${TAUX_TVA * prixHT} € | Prix TTC : ${prixTTC} €`
        );

        // Lors de modification de TAUX_TVA dans le code,
        // la console affichera une erreur
        // parce que const signifie que la valeur ne peut pas être modifiée.

    </script>

</body>

</html>
